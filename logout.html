<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout -Zara the Clothing Brand</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .logout-container {
      text-align: center;
      background: rgb(218, 136, 136);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .logout-container h1 {
      margin: 0 0 20px;
    }
    .logout-container p {
      margin: 10px 0 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #333;
      color: rgb(255, 255, 255);
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    .redirect-message {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="logout-container">
    <h1>You've Logged Out</h1>
    <p>Thank you for visiting our store. We hope to see you again soon!</p>
    <button onclick="redirectLogin()">Log Back In</button>
    <p class="redirect-message" id="redirectMessage"></p>
  </div>

  <script>
    function redirectHome() {
      document.getElementById('redirectMessage').textContent = "Redirecting to homepage...";
      setTimeout(() => {
        window.location.href = "/"; 
      }, 2000);
    }
    function redirectLogin() {
      document.getElementById('redirectMessage').textContent = "Redirecting to login page...";
      setTimeout(() => {
        window.location.href = "/login"; 
      }, 2000);
    }
  </script>
</body>
</html>
